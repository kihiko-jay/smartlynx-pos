# ─────────────────────────────────────────────────────────────────────────────
# Smartlynx — Production nginx reverse proxy
#
# Features:
#   - SSL/TLS termination (TLSv1.2 + TLSv1.3 only)
#   - M-Pesa callback: Safaricom IP allowlist (sole route to /mpesa/callback)
#   - Per-IP rate limiting on auth and payment endpoints
#   - WebSocket proxy for /ws/pos/* with proper upgrade handling
#   - gzip compression for JSON API responses
#   - Security headers (HSTS, X-Frame-Options, CSP)
#   - HTTP → HTTPS redirect
#
# Cert management (Let's Encrypt / certbot):
#   certbot --nginx -d yourdomain.com
#   or mount certs at /etc/nginx/certs/{fullchain.pem,privkey.pem}
# ─────────────────────────────────────────────────────────────────────────────

worker_processes auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ───────────────────────────────────────────────────────────────
    log_format main_json escape=json
        '{'
            '"ts":"$time_iso8601",'
            '"remote_addr":"$remote_addr",'
            '"method":"$request_method",'
            '"uri":"$uri",'
            '"status":$status,'
            '"bytes_sent":$bytes_sent,'
            '"request_time":$request_time,'
            '"upstream_time":"$upstream_response_time",'
            '"http_referer":"$http_referer",'
            '"http_user_agent":"$http_user_agent",'
            '"request_id":"$http_x_request_id"'
        '}';

    access_log /var/log/nginx/access.log main_json;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    server_tokens off;                  # don't reveal nginx version

    # ── Gzip ──────────────────────────────────────────────────────────────────
    gzip on;
    gzip_types application/json application/javascript text/css text/plain;
    gzip_min_length 1024;
    gzip_vary on;

    # ── Rate limiting zones ───────────────────────────────────────────────────
    # Auth: 10 req/min per IP (mirrors backend RATE_LIMIT_LOGIN_PER_MINUTE)
    limit_req_zone $binary_remote_addr zone=auth_zone:10m rate=10r/m;

    # General API: 300 req/min per IP
    limit_req_zone $binary_remote_addr zone=api_zone:20m rate=300r/m;

    # Payment STK push: 30 req/min per IP (conservative — real STK push is ~1/txn)
    limit_req_zone $binary_remote_addr zone=payment_zone:5m rate=30r/m;

    limit_req_status 429;

    # ── Upstream ──────────────────────────────────────────────────────────────
    upstream smartlynx_api {
        server api:8000;
        keepalive 32;
    }

    # ── HTTP → HTTPS redirect ─────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # ACME challenge (Let's Encrypt cert renewal)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS main server ─────────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name yourdomain.com;      # ← set to your domain

        # ── TLS ───────────────────────────────────────────────────────────────
        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;

        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # OCSP stapling
        ssl_stapling        on;
        ssl_stapling_verify on;

        # ── Security headers ──────────────────────────────────────────────────
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy no-referrer-when-downgrade always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; connect-src 'self' wss:; img-src 'self' data:;" always;

        # ── Request size limits ───────────────────────────────────────────────
        client_max_body_size 2m;
        client_body_timeout  30s;
        client_header_timeout 10s;

        # ── Proxy defaults ────────────────────────────────────────────────────
        proxy_http_version  1.1;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_set_header    X-Request-ID      $request_id;
        proxy_read_timeout  60s;
        proxy_send_timeout  30s;
        proxy_connect_timeout 5s;

        # ── Auth endpoints — strict rate limiting ─────────────────────────────
        location /api/v1/auth/login {
            limit_req zone=auth_zone burst=5 nodelay;
            proxy_pass http://smartlynx_api;
        }

        # ── M-PESA callback — Safaricom IP allowlist ONLY ─────────────────────
        #
        # CRITICAL: Only Safaricom IPs may POST to this endpoint.
        # Reference: https://developer.safaricom.co.ke/APIs/MpesaExpressSimulate
        # IP ranges last verified: 2024-01
        # Periodically check Safaricom developer portal for range updates.
        location /api/v1/mpesa/callback {
            # Safaricom production IP ranges
            allow 196.201.214.200/29;    # Safaricom prod primary
            allow 196.201.214.208/29;    # Safaricom prod secondary
            allow 125.163.64.0/20;       # Safaricom sandbox (dev only — remove in prod)
            deny  all;

            limit_req zone=payment_zone burst=20 nodelay;
            proxy_pass http://smartlynx_api;
        }

        # ── STK push — payment zone rate limit ────────────────────────────────
        location /api/v1/mpesa/stk-push {
            limit_req zone=payment_zone burst=10 nodelay;
            proxy_pass http://smartlynx_api;
        }

        # ── WebSocket — POS terminal connections ─────────────────────────────
        location /ws/ {
            proxy_pass http://smartlynx_api;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host       $host;
            proxy_read_timeout  3600s;  # hold WS connections for up to 1hr
            proxy_send_timeout  3600s;
        }

        # ── Internal-only endpoints — block public access ─────────────────────
        location ~ ^/(health/deep|metrics) {
            # Allow only internal RFC-1918 ranges and localhost
            # Adjust to your actual VPC/management CIDR
            allow 127.0.0.1;
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            allow 192.168.0.0/16;
            deny  all;
            proxy_pass http://smartlynx_api;
        }

        # ── All other API routes — general rate limit ─────────────────────────
        location /api/ {
            limit_req zone=api_zone burst=50 nodelay;
            proxy_pass http://smartlynx_api;
        }

        # ── Shallow health — public (load balancer probe) ─────────────────────
        location /health {
            proxy_pass http://smartlynx_api;
            access_log off;
        }
    }
}
