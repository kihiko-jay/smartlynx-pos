# Smartlynx — Production Docker Compose
version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: smartlynx_db_prod
    restart: unless-stopped
    environment:
      POSTGRES_USER: smartlynx
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: smartlynx_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartlynx -d smartlynx_db"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [smartlynx_net]

  redis:
    image: redis:7-alpine
    container_name: smartlynx_redis_prod
    restart: unless-stopped
    command: ["sh", "-c", "redis-server --appendonly yes --requirepass $$REDIS_PASSWORD"]
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $$REDIS_PASSWORD ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [smartlynx_net]

  migrate:
    image: smartlynx-api:${APP_VERSION:-4.5.1}
    env_file:
      - .env
    command: ["alembic", "upgrade", "head"]
    depends_on:
      db:
        condition: service_healthy
    restart: "no"
    networks: [smartlynx_net]

  api:
    image: smartlynx-api:${APP_VERSION:-4.5.1}
    container_name: smartlynx_api_prod
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://smartlynx:${POSTGRES_PASSWORD}@db:5432/smartlynx_db
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      ENVIRONMENT: production
      DEBUG: "false"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      # /ready probes DB + Redis — only marks healthy when the API can serve requests.
      # /health (liveness) is intentionally NOT used here: a running-but-broken process
      # would pass liveness but must fail readiness so Compose delays dependent services.
      test: ["CMD-SHELL", "curl -f --no-progress-meter http://localhost:8000/ready || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s   # wait for Alembic migrations to complete before first check
    networks: [smartlynx_net]

  sync-agent:
    image: smartlynx-sync-agent:${APP_VERSION:-4.5.1}
    container_name: smartlynx_sync_agent_prod
    restart: unless-stopped
    env_file:
      - ../sync-agent/.env
    environment:
      CLOUD_API_BASE_URL: http://api:8000/api/v1
      # Heartbeat file path — must match the volume mount below.
      # index.js touches this file after every transaction sync cycle (every 10s).
      HEARTBEAT_FILE: /app/data/heartbeat
    volumes:
      - sync_agent_data:/app/data
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      # File-age check: the heartbeat file must have been modified within
      # the last 5 minutes (300 seconds). The transaction loop runs every 10s
      # so 5 minutes is a very conservative threshold — it survives backoff
      # storms, transient cloud errors, and slow startup, while still
      # catching a truly hung or crashed sync loop.
      #
      # Why not an HTTP check? The sync-agent is a pure background worker
      # with no HTTP server. A file-age check is the correct pattern here.
      #
      # find exits 0 if the file is found AND younger than -mmin 5.
      # find exits non-zero (file too old or missing) → Docker marks unhealthy.
      test: ["CMD-SHELL", "find /app/data/heartbeat -mmin -5 | grep -q heartbeat || exit 1"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 60s   # allow one full transaction sync cycle + startup time
    networks: [smartlynx_net]

  nginx:
    image: nginx:1.27-alpine
    container_name: smartlynx_nginx_prod
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    networks: [smartlynx_net]

volumes:
  postgres_data:
  redis_data:
  # Named volume for sync-agent heartbeat and checkpoint persistence.
  # Survives container restarts — prevents checkpoint loss on redeploy.
  sync_agent_data:

networks:
  smartlynx_net:
    driver: bridge
